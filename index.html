<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>จัดการช่องจอดรถ · Carpark Slot Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Sarabun', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">
  <div class="max-w-6xl mx-auto px-4 py-8">

    <!-- Header -->
    <header class="mb-6">
      <h1 class="text-2xl sm:text-3xl font-bold text-slate-900">🅿️ จัดการช่องจอดรถ</h1>
      <p class="text-slate-500 mt-1">สรุปช่องที่จอดรถจรัลประสิทธิ์ — Carpark Slot Manager</p>
    </header>

    <!-- Stat cards -->
    <div class="grid grid-cols-3 gap-3 mb-6">
      <div class="bg-white rounded-xl shadow-sm p-4">
        <div class="text-slate-500 text-sm">ทั้งหมด · Total</div>
        <div id="stat-total" class="text-2xl font-bold text-slate-900">—</div>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-4">
        <div class="text-slate-500 text-sm">ว่าง · Vacant</div>
        <div id="stat-vacant" class="text-2xl font-bold text-emerald-600">—</div>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-4">
        <div class="text-slate-500 text-sm">ไม่ว่าง · Occupied</div>
        <div id="stat-occupied" class="text-2xl font-bold text-rose-600">—</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="bg-white rounded-xl shadow-sm p-4 mb-6 flex flex-col sm:flex-row gap-3 sm:items-center">
      <input id="search" type="text" placeholder="ค้นหา ช่อง / ชื่อ / ห้อง…"
        class="flex-1 border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      <select id="filter-status"
        class="border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="">ทุกสถานะ · All status</option>
        <option value="Vacant">ว่าง · Vacant</option>
        <option value="Occupied">ไม่ว่าง · Occupied</option>
      </select>
      <button id="btn-add"
        class="bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg px-4 py-2 transition">
        + เพิ่มช่องจอด
      </button>
    </div>

    <!-- Table area -->
    <div id="content" class="space-y-6">
      <p class="text-center text-slate-400 py-10">กำลังโหลด…</p>
    </div>
  </div>

  <!-- Edit / Add modal -->
  <div id="modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md">
      <form id="form" class="p-6 space-y-4">
        <h2 id="modal-title" class="text-xl font-bold text-slate-900">เพิ่มช่องจอด</h2>
        <input type="hidden" id="f-id" />

        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1">ช่องจอด · Slot code <span class="text-rose-500">*</span></label>
          <input id="f-slot_code" required class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1">โซน · Zone</label>
          <input id="f-zone" list="zone-list" class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
          <datalist id="zone-list"></datalist>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-slate-600 mb-1">ชื่อ · Name</label>
            <input id="f-name" class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-600 mb-1">ห้อง · Room</label>
            <input id="f-room" class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1">ทะเบียนรถ · License plate</label>
          <input id="f-plate" class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1">สถานะ · Status</label>
          <select id="f-status" class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="Vacant">ว่าง · Vacant</option>
            <option value="Occupied">ไม่ว่าง · Occupied</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1">หมายเหตุ · Note</label>
          <input id="f-note" class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div class="flex justify-between items-center pt-2">
          <button type="button" id="btn-delete" class="text-rose-600 hover:text-rose-700 font-medium hidden">ลบ · Delete</button>
          <div class="flex gap-2 ml-auto">
            <button type="button" id="btn-cancel" class="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-50">ยกเลิก</button>
            <button type="submit" class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-medium">บันทึก</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API = '/api/slots';
    let slots = [];

    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

    // Fixed slot ordering: NE, SE, SW, NW, On, OW
    const PREFIX_ORDER = ['NE', 'SE', 'SW', 'NW', 'ON', 'OW'];
    function slotRank(code) {
      const m = String(code ?? '').match(/^\s*([A-Za-z]+)\s*(\d+)/);
      const prefix = m ? m[1].toUpperCase() : '';
      const num = m ? parseInt(m[2], 10) : 0;
      const idx = PREFIX_ORDER.indexOf(prefix);
      return [idx === -1 ? 99 : idx, num, String(code ?? '')];
    }
    function bySlot(a, b) {
      const ra = slotRank(a.slot_code), rb = slotRank(b.slot_code);
      return ra[0] - rb[0] || ra[1] - rb[1] || ra[2].localeCompare(rb[2]);
    }

    async function load() {
      try {
        const res = await fetch(API);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        slots = (await res.json()).sort(bySlot);
        render();
      } catch (e) {
        $('content').innerHTML =
          `<div class="bg-rose-50 border border-rose-200 text-rose-700 rounded-xl p-4">
             โหลดข้อมูลไม่สำเร็จ: ${esc(e.message)}<br>
             <span class="text-sm">ตรวจสอบว่าตั้งค่า DATABASE_URL และรันสกีมาแล้ว</span>
           </div>`;
      }
    }

    function render() {
      // stats
      $('stat-total').textContent = slots.length;
      $('stat-vacant').textContent = slots.filter(s => s.status === 'Vacant').length;
      $('stat-occupied').textContent = slots.filter(s => s.status === 'Occupied').length;

      // zone datalist
      const zones = [...new Set(slots.map(s => s.zone).filter(Boolean))];
      $('zone-list').innerHTML = zones.map(z => `<option value="${esc(z)}">`).join('');

      // filters
      const q = $('search').value.trim().toLowerCase();
      const status = $('filter-status').value;
      const filtered = slots.filter(s => {
        if (status && s.status !== status) return false;
        if (!q) return true;
        return [s.slot_code, s.name, s.plate, s.room, s.note, s.zone]
          .some(v => String(v ?? '').toLowerCase().includes(q));
      });

      if (!filtered.length) {
        $('content').innerHTML = `<p class="text-center text-slate-400 py-10">ไม่พบข้อมูล</p>`;
        return;
      }

      // group by zone, keep first-seen order
      const groups = new Map();
      for (const s of filtered) {
        const z = s.zone || '— ไม่ระบุโซน —';
        if (!groups.has(z)) groups.set(z, []);
        groups.get(z).push(s);
      }

      let html = '';
      for (const [zone, rows] of groups) {
        html += `
          <section class="bg-white rounded-xl shadow-sm overflow-hidden">
            <div class="px-4 py-3 bg-slate-50 border-b border-slate-200 font-semibold text-slate-700">${esc(zone)}</div>
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead class="text-slate-500 border-b border-slate-200">
                  <tr>
                    <th class="text-left font-medium px-4 py-2 w-28">ช่องจอด</th>
                    <th class="text-left font-medium px-4 py-2">ชื่อ / ห้อง</th>
                    <th class="text-left font-medium px-4 py-2 w-32">ทะเบียน</th>
                    <th class="text-left font-medium px-4 py-2 w-32">สถานะ</th>
                    <th class="text-left font-medium px-4 py-2">หมายเหตุ</th>
                    <th class="px-4 py-2 w-20"></th>
                  </tr>
                </thead>
                <tbody>
                  ${rows.map(rowHtml).join('')}
                </tbody>
              </table>
            </div>
          </section>`;
      }
      $('content').innerHTML = html;

      document.querySelectorAll('[data-edit]').forEach(btn =>
        btn.addEventListener('click', () => openModal(slots.find(s => s.id == btn.dataset.edit))));
    }

    // Combined "Name / Room" cell: name, then "ห้อง <room>" if present.
    function nameRoom(s) {
      const parts = [];
      if (s.name) parts.push(esc(s.name));
      if (s.room) parts.push('ห้อง ' + esc(s.room));
      return parts.length ? parts.join(' · ') : '<span class="text-slate-300">—</span>';
    }

    function rowHtml(s) {
      const badge = s.status === 'Occupied'
        ? '<span class="inline-block px-2 py-0.5 rounded-full bg-rose-100 text-rose-700 text-xs font-medium">ไม่ว่าง</span>'
        : '<span class="inline-block px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700 text-xs font-medium">ว่าง</span>';
      return `
        <tr class="border-b border-slate-100 hover:bg-slate-50">
          <td class="px-4 py-2 font-semibold text-slate-800">${esc(s.slot_code)}</td>
          <td class="px-4 py-2">${nameRoom(s)}</td>
          <td class="px-4 py-2">${esc(s.plate) || '<span class="text-slate-300">—</span>'}</td>
          <td class="px-4 py-2">${badge}</td>
          <td class="px-4 py-2 text-slate-500">${esc(s.note) || ''}</td>
          <td class="px-4 py-2 text-right">
            <button data-edit="${s.id}" class="text-blue-600 hover:text-blue-800 font-medium">แก้ไข</button>
          </td>
        </tr>`;
    }

    // ---- Modal ----
    function openModal(s) {
      const isEdit = !!s;
      $('modal-title').textContent = isEdit ? 'แก้ไขช่องจอด' : 'เพิ่มช่องจอด';
      $('f-id').value = s?.id ?? '';
      $('f-slot_code').value = s?.slot_code ?? '';
      $('f-zone').value = s?.zone ?? '';
      $('f-name').value = s?.name ?? '';
      $('f-plate').value = s?.plate ?? '';
      $('f-room').value = s?.room ?? '';
      $('f-status').value = s?.status ?? 'Vacant';
      $('f-note').value = s?.note ?? '';
      $('btn-delete').classList.toggle('hidden', !isEdit);
      $('modal').classList.remove('hidden');
      $('modal').classList.add('flex');
    }
    function closeModal() {
      $('modal').classList.add('hidden');
      $('modal').classList.remove('flex');
    }

    $('btn-add').addEventListener('click', () => openModal(null));
    $('btn-cancel').addEventListener('click', closeModal);
    $('modal').addEventListener('click', (e) => { if (e.target.id === 'modal') closeModal(); });
    $('search').addEventListener('input', render);
    $('filter-status').addEventListener('change', render);

    $('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = $('f-id').value;
      const payload = {
        slot_code: $('f-slot_code').value,
        zone: $('f-zone').value,
        name: $('f-name').value,
        plate: $('f-plate').value,
        room: $('f-room').value,
        status: $('f-status').value,
        note: $('f-note').value,
      };
      const url = id ? `${API}?id=${id}` : API;
      const method = id ? 'PUT' : 'POST';
      const res = await fetch(url, {
        method,
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!res.ok) { alert('บันทึกไม่สำเร็จ'); return; }
      closeModal();
      await load();
    });

    $('btn-delete').addEventListener('click', async () => {
      const id = $('f-id').value;
      if (!id || !confirm('ลบช่องจอดนี้?')) return;
      const res = await fetch(`${API}?id=${id}`, { method: 'DELETE' });
      if (!res.ok) { alert('ลบไม่สำเร็จ'); return; }
      closeModal();
      await load();
    });

    load();
  </script>
</body>
</html>
